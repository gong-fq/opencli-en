<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguistFlow - 专业英语精读助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 思考中小动画：三点跳动 */
        .typing-loader { display: flex; gap: 6px; }
        .dot {
            width: 10px; height: 10px;
            background: #6366f1; border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
        /* 美化生成的Markdown表格 */
        table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
        th, td { border: 1px solid #e2e8f0; padding: 8px 12px; text-align: left; }
        th { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-900">

    <div class="max-w-4xl mx-auto py-12 px-6">
        <header class="mb-12 flex justify-between items-end border-b border-slate-200 pb-8">
            <div>
                <h1 class="text-4xl font-extrabold text-indigo-950 tracking-tight">LinguistFlow</h1>
                <p class="text-slate-500 mt-2 font-medium">深度语言学分析 & RP 标准音标</p>
            </div>
            <button id="speakBtn" class="hidden flex items-center gap-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-5 py-2.5 rounded-full transition font-semibold border border-indigo-200">
                <span>🔊 Listen (RP Accent)</span>
            </button>
        </header>

        <main class="space-y-8">
            <div class="bg-white p-6 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100">
                <textarea id="userInput" class="w-full p-4 border-none bg-slate-50 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-lg placeholder-slate-400" rows="5" placeholder="请粘贴您想要精读的英文段落..."></textarea>
                <div class="flex justify-between items-center mt-6">
                    <span class="text-xs text-slate-400 font-mono italic">DeepSeek-V3 Engine Loaded</span>
                    <button id="analyzeBtn" class="bg-indigo-600 text-white px-10 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all transform active:scale-95 shadow-lg shadow-indigo-200">开始深度分析</button>
                </div>
            </div>

            <div id="loader" class="hidden flex flex-col items-center justify-center py-16 space-y-4">
                <div class="typing-loader">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
                <p class="text-indigo-600 font-bold animate-pulse">大语言模型正在深度分析语境与音标...</p>
            </div>

            <div id="resultContainer" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="bg-white p-10 rounded-2xl shadow-lg border border-slate-100 prose prose-indigo max-w-none">
                    <div id="responseOutput" class="text-slate-800 leading-relaxed"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loader = document.getElementById('loader');
        const resultContainer = document.getElementById('resultContainer');
        const output = document.getElementById('responseOutput');
        const speakBtn = document.getElementById('speakBtn');

        // TTS 语音功能：尝试匹配英国英语
        function speakText(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); // 停止当前正在播放的语音
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            // 筛选英国音标 (en-GB)
            const rpVoice = voices.find(v => v.lang === 'en-GB' || v.name.includes('Great Britain')) || voices[0];
            utterance.voice = rpVoice;
            utterance.rate = 0.85; // 稍微慢一点，方便听清细节
            window.speechSynthesis.speak(utterance);
        }

        analyzeBtn.addEventListener('click', async () => {
            const text = document.getElementById('userInput').value.trim();
            if (!text) return;

            // UI 状态切换
            analyzeBtn.disabled = true;
            loader.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            speakBtn.classList.add('hidden');

            try {
                const res = await fetch('/.netlify/functions/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                
                if (!res.ok) throw new Error('解析失败，请检查网络或API配置');
                
                const data = await res.json();
                
                // 使用 Marked 渲染渲染结果
                output.innerHTML = marked.parse(data.reply);
                
                resultContainer.classList.remove('hidden');
                speakBtn.classList.remove('hidden');
                
                // 绑定朗读事件
                speakBtn.onclick = () => speakText(text);

            } catch (err) {
                output.innerHTML = `<div class="p-4 bg-red-50 text-red-700 rounded-lg">抱歉，出现了一个错误：${err.message}</div>`;
                resultContainer.classList.remove('hidden');
            } finally {
                analyzeBtn.disabled = false;
                loader.classList.add('hidden');
            }
        });

        // 某些浏览器需要预热语音列表
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    </script>
</body>
</html>
